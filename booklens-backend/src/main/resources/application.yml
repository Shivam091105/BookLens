spring:
  application:
    name: booklens-backend

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/booklens}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:te31204}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ── JPA / Hibernate ─────────────────────────────────────────────────────
  jpa:
    hibernate:
      # 'update' on first run — Hibernate creates/alters tables automatically.
      # Switch to 'validate' in production after schema is stable.
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── Redis (caching) ─────────────────────────────────────────────────────
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms

  # ── Jackson ─────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ── Server ──────────────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ── JWT ─────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:Ojz8YO4EC791CdmCWCi9REDkVc3OI8Uz}
  expiration-ms: 86400000           # 24 hours
  refresh-expiration-ms: 604800000  # 7 days

# ── Open Library API ────────────────────────────────────────────────────────
# Free, no API key required. Docs: https://openlibrary.org/developers/api
open-library:
  base-url: https://openlibrary.org
  covers-url: https://covers.openlibrary.org/b

# ── Google OAuth2 ────────────────────────────────────────────────────────────
google:
  client-id: ${GOOGLE_CLIENT_ID:1082269421859-89k9fofusdm2esu0feqe91kuhss479rg.apps.googleusercontent.com}

# ── Recommendation Engine ────────────────────────────────────────────────────
recommendation:
  cache-ttl-minutes: 60
  max-results: 20
  collaborative-weight: 0.6
  content-weight: 0.4
  min-ratings-for-cf: 5

# ── CORS ─────────────────────────────────────────────────────────────────────
cors:
  allowed-origins:
    - http://localhost:5173
    - http://localhost:5174
    - http://localhost:5175
    - http://localhost:3000
    - ${CORS_ALLOWED_ORIGINS:https://booklens.vercel.app}

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.booklens: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO